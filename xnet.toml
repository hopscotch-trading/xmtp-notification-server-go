[xnet]
use_standard_ports = true

[xmtpd]
image = "ghcr.io/xmtp/xmtpd"
version = "04-01-implement_api_schema_changes"

[gateway]
image = "ghcr.io/xmtp/xmtpd-gateway"
version = "04-01-implement_api_schema_changes"

[v3]
image = "ghcr.io/xmtp/node-go"
version = "main"

[validation]
image = "ghcr.io/xmtp/mls-validation-service"
version = "main"

[contracts]
version = "v2026.02.10-1"

# Nodes are added manually via: xnet-cli node add --migrator
# This is done in dev/up after `xnet-cli up --paused`
